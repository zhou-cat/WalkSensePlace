<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WalkSensePlace — Pressure Line Plots</title>
  <link rel="stylesheet" href="pressure.css" />
</head>

<body>
  <header class="site-header">
    <div class="wrap">
      <h1>Pressure Line Plots</h1>
      <p class="subtitle">
        Interactive Plotly figures exported from Python and embedded here.
      </p>
    </div>
  </header>

  <nav class="nav-bar">
    <div class="wrap nav-inner">
      <a class="back-link" href="../main - front page/index.html">← Back to Home</a>

      <div class="controls">
        <label for="plotSelect">Select plot:</label>
        <select id="plotSelect">
          <option value="pressure_plot.html">Default</option>
        </select>
      </div>
    </div>
  </nav>

  <main class="wrap">
    <section class="card">
      <div class="card-header">
        <h2 id="plotTitle">Pressure Sensor Readings Over Time</h2>
        <p class="caption">
          Tip: Use the Plotly toolbar to zoom/pan, autoscale, and save images.
        </p>
      </div>

      <iframe
        id="plotFrame"
        class="plot-frame"
        src="plots/pressure_plot.html"
        title="Pressure Line Plots"
      ></iframe>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>WalkSensePlace · Pressure Visualizations</p>
    </div>
  </footer>

  <script src="pressure.js"></script>
</body>
</html>
